<!DOCTYPE html>
<html>
<head>
    <title>Nebula Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 glass p-5 text-center">
                <h2 id="authTitle" class="fw-bold mb-2">Welcome</h2>
                <p class="text-secondary mb-4 small">Enter your coordinates to proceed</p>
                
                <form onsubmit="handleAuth(event)">
                    <input type="email" id="email" class="form-control mb-3" placeholder="Email Address" required>
                    <input type="password" id="password" class="form-control mb-4" placeholder="Password" required>
                    <button id="authBtn" class="btn btn-nebula w-100">Login</button>
                </form>

                <div class="mt-4">
                    <a href="#" onclick="toggleAuth()" id="toggleLink" class="small text-decoration-none text-info">New Pilot? Create Account</a>
                </div>
                <p id="authMsg" class="mt-3 small"></p>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
