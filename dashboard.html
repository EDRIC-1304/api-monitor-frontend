<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
  <div class="container mt-5">
    <h2>API Dashboard</h2>

    <div id="patternAlert" class="mb-3 fw-bold"></div>

    <h4>Requests Over Time</h4>
    <canvas id="requestsChart"></canvas>

    <h4 class="mt-4">Errors Over Time</h4>
    <canvas id="errorsChart"></canvas>

    <h4 class="mt-4">Latency</h4>
    <canvas id="latencyChart"></canvas>

    <h3 class="mt-5">Recent Logs</h3>

    <table class="table table-bordered">
      <thead>
        <tr>
          <th>URL</th>
          <th>Status</th>
          <th>Time</th>
          <th>Retry</th>
          <th>Retry Success</th>
          <th>Error</th>
        </tr>
      </thead>
      <tbody id="logTable"></tbody>
    </table>

    <a href="index.html" class="btn btn-secondary">Back to Tester</a>
  </div>

  <script src="js/script.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    loadDashboard();
  </script>
</body>
</html>
