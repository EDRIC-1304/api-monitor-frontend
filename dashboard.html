<!DOCTYPE html>
<html>
<head>
    <title>Nebula Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold m-0">Analytics Console</h2>
                <div id="patternAlert" class="mb-4"></div>
            </div>
            <a href="index.html" class="btn btn-outline-light btn-sm px-4">Back to Tester</a>
        </div>

        <div class="row g-4 mb-5">
    <div class="col-md-4">
        <div class="glass p-4">
            <h6 class="text-secondary small mb-3">Requests</h6>
            <div style="height: 150px;"> <!-- Add height here -->
                <canvas id="requestsChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="glass p-4">
            <h6 class="text-secondary small mb-3">Errors</h6>
            <div style="height: 150px;"> <!-- Add height here -->
                <canvas id="errorsChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="glass p-4">
            <h6 class="text-secondary small mb-3">Latency (ms)</h6>
            <div style="height: 150px;"> <!-- Add height here -->
                <canvas id="latencyChart"></canvas>
            </div>
        </div>
    </div>
</div>

        <div class="glass p-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">Transmission Logs</h4>
                <button id="viewAllBtn" onclick="toggleLogs()" class="btn btn-sm btn-outline-info">View All Logs</button>
            </div>
            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Endpoint</th>
                            <th>Status</th>
                            <th>Time</th>
                            <th>Retry Status</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="logTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/dashboard.js"></script>
    <script>loadDashboard();</script>
</body>
</html>
