<!DOCTYPE html>
<html>
<head>
  <title>API Tester</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
  <div class="container mt-5">
    <h2>API Tester</h2>

    <input id="url" class="form-control mb-2" placeholder="Enter API URL" />

    <select id="method" class="form-control mb-2">
      <option>GET</option>
      <option>POST</option>
    </select>

    <button onclick="testAPI()" class="btn btn-primary">Test API</button>

    <pre id="result" class="mt-3 bg-light p-3"></pre>

    <a href="dashboard.html" class="btn btn-secondary mt-3">Go to Dashboard</a>
  </div>

  <script src="js/script.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
