<!DOCTYPE html>
<html>
<head>
    <title>API Mission Control</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="container py-4 d-flex justify-content-between align-items-center">
        <h4 class="fw-bold text-info m-0">NEBULA API</h4>
        <div class="d-flex gap-4">
            <a href="dashboard.html" class="nav-link">Analytics</a>
            <a href="#" onclick="logout()" class="nav-link text-danger">Logout</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 glass p-5">
                <h3 class="mb-4">Launch API Test</h3>
                <div class="row g-3">
                    <div class="col-md-9">
                        <input id="url" class="form-control" placeholder="https://api.example.com/v1/data">
                    </div>
                    <div class="col-md-3">
                        <select id="method" class="form-control">
                            <option>GET</option>
                            <option>POST</option>
                        </select>
                    </div>
                </div>
                <button onclick="testAPI()" class="btn btn-nebula mt-4 px-5">Execute Request</button>

                <div class="mt-5">
                    <h6 class="text-secondary text-uppercase small mb-3">Response Output</h6>
                    <pre id="result" class="p-4 rounded-4" style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); min-height: 100px; color: #10b981;">Ready for input...</pre>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
